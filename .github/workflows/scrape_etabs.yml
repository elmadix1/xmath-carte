name: Scrape Etablissements AEFE

on:
  schedule:
    - cron: '0 3 * * 0'  # Chaque dimanche à 3h du matin
  workflow_dispatch:       # Déclenchement manuel depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Run scraper
        run: python scrape_etabs.py

      - name: Commit etablissements.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add etablissements.json
          git add coords_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update etablissements.json $(date +'%Y-%m-%d')"
          git push
