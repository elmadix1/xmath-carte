name: Scrape emplois AEFE

on:
  schedule:
    - cron: '0 3 * * *'   # Chaque nuit à 3h UTC
  workflow_dispatch:        # Lancement manuel depuis GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scrape_emplois.py

      - name: Commit & push emplois.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emplois.json
          git diff --staged --quiet || git commit -m "Update emplois.json $(date +'%Y-%m-%d')"
          git push
