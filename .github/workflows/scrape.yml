name: Scrape AEFE Emplois + Deploy

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        run: python scrape_emplois.py

      - name: Commit emplois.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emplois.json
          git diff --staged --quiet || git commit -m "Update emplois.json $(date +'%Y-%m-%d %H:%M')"
          git push
