name: Scrape AEFE + MLF Emplois + Deploy
on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install selenium requests beautifulsoup4
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run scraper AEFE
        run: python scrape_emplois.py
      - name: Run scraper MLF
        run: python scraper_mlf.py
      - name: Commit JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emplois.json emplois_mlf.json sitemap.xml
          git diff --staged --quiet || git commit -m "Update emplois AEFE + MLF + sitemap $(date +'%Y-%m-%d %H:%M')"
          git push
